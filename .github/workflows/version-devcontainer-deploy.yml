name: Deploy a single version (Devcontainer)

on:
  workflow_dispatch:
    inputs:
      idris-lsp-version:
        description: Idris LSP version to deploy
        required: true
        default: latest
        type: string
      idris-version:
        description: Idris 2 version to deploy
        required: true
        default: latest
        type: string
  workflow_call:
    inputs:
      idris-lsp-version:
        required: true
        type: string
      idris-version:
        required: true
        type: string

permissions:
  packages: write
  contents: read

jobs:
  deploy-devcontainer:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      HAS_REMOTE_BUILDER: ${{ secrets.SSH_IP != '' && secrets.SSH_PRIVATE_KEY != '' && secrets.SSH_USER != '' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      
      - name: Set up SSH
        if: env.HAS_REMOTE_BUILDER == 'true'
        uses: MrSquaare/ssh-setup-action@v3
        with:
          host: ${{ secrets.SSH_IP }}
          private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          private-key-name: oracle-arm
      
      - name: Set up Docker Buildx
        if: env.HAS_REMOTE_BUILDER == 'true'
        uses: docker/setup-buildx-action@v3
        with:
          append: |
            - endpoint: ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }}

      - name: Set up QEMU
        if: env.HAS_REMOTE_BUILDER != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: env.HAS_REMOTE_BUILDER != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: create-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}/devcontainer

      - name: Build Devcontainer
        uses: ./.github/actions/build-devcontainer-img
        with:
          idris-lsp-version: ${{ inputs.idris-lsp-version }}
          idris-version: ${{ inputs.idris-version }}
          push: true
          tags: ghcr.io/${{ github.repository }}/devcontainer:${{ inputs.idris-version }}
          labels: ${{ steps.create-meta.outputs.labels }}
          base-tag: ghcr.io/${{ github.repository }}/base:${{ inputs.idris-version }}
          platforms: linux/arm64,linux/amd64
