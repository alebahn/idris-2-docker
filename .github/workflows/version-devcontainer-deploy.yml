name: Deploy a single version (Devcontainer)

on:
  workflow_dispatch:
    inputs:
      idris-lsp-version:
        description: Idris LSP version to deploy
        required: true
        default: latest
        type: string
      idris-version:
        description: Idris 2 version to deploy
        required: true
        default: latest
        type: string
  workflow_call:
    inputs:
      idris-lsp-version:
        required: true
        type: string
      idris-version:
        required: true
        type: string

permissions:
  packages: write
  contents: read

jobs:
  deploy-devcontainer:
    name: Deploy (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: create-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}/devcontainer

      - name: Build Devcontainer
        uses: ./.github/actions/build-devcontainer-img
        with:
          idris-lsp-version: ${{ inputs.idris-lsp-version }}
          idris-version: ${{ inputs.idris-version }}
          push: true
          tags: ghcr.io/${{ github.repository }}/devcontainer:${{ inputs.idris-version }}-${{ matrix.arch }}
          labels: ${{ steps.create-meta.outputs.labels }}
          base-tag: ghcr.io/${{ github.repository }}/base:${{ inputs.idris-version }}
          platforms: ${{ matrix.platform }}

  deploy-devcontainer-manifest:
    name: Deploy Manifest
    runs-on: ubuntu-latest
    needs: deploy-devcontainer
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}/devcontainer:${{ inputs.idris-version }} \
            ghcr.io/${{ github.repository }}/devcontainer:${{ inputs.idris-version }}-amd64 \
            ghcr.io/${{ github.repository }}/devcontainer:${{ inputs.idris-version }}-arm64
